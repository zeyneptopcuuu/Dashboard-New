name: Sprint Dashboard - Haftalik Guncelleme

on:
  schedule:
    - cron: "0 10 * * 2"   # Sali 13:00 (TR saati)
    - cron: "0 11 * * 3"   # Carsamba 14:00 (TR saati)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu al
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Raporu Jira'dan uret
        env:
          JIRA_BASE_URL: ${{ secrets.JIRA_BASE_URL }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
          JIRA_PROJECT_KEY: ${{ secrets.JIRA_PROJECT_KEY }}
        run: python scripts/generate_report.py

      - name: Son kontrol zaman damgasini guncelle
        run: |
          mkdir -p .github
          echo "Son otomatik kontrol: $(date -u '+%Y-%m-%d %H:%M UTC')" > .github/last-check.txt

      - name: Her zaman commit + push et (repo aktif kalsin, cron devre disi kalmasin)
        run: |
          git config user.name "sprint-dashboard-bot"
          git config user.email "actions@github.com"
          git add index.html .github/last-check.txt
          git commit -m "chore: sprint dashboard kontrolu [skip ci]" --allow-empty
          git push
